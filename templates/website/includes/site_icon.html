<span class="ees-icon ees-icon--{{ size }}" aria-hidden="true">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    {% if name == "shield" %}
    <path d="M12 3 4 7v6c0 5 3.5 8.5 8 9 4.5-.5 8-4 8-9V7l-8-4z"/>
    {% elif name == "cctv" %}
    <path d="M4 8V6a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v2"/><path d="M4 8h16v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8z"/><circle cx="12" cy="12" r="2.5"/><path d="M16 8l4-2v12l-4-2"/>
    {% elif name == "access" %}
    <rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/>
    {% elif name == "facial" %}
    <circle cx="12" cy="10" r="3"/><path d="M6 20c1.2-3 3.6-5 6-5s4.8 2 6 5"/><path d="M16 8l2-2M8 8 6 6"/>
    {% elif name == "fire" %}
    <path d="M12 3c1.5 2.5 4 4 4 7a4 4 0 1 1-8 0c0-3 2.5-4.5 4-7z"/><path d="M12 14v4"/>
    {% elif name == "radio" %}
    <path d="M4.5 16.5c1.5-3 4.5-5 7.5-5s6 2 7.5 5"/><path d="M7 19c1-2 3-3.5 5-3.5s4 1.5 5 3.5"/><circle cx="12" cy="12" r="1.5"/>
    {% elif name == "server" %}
    <rect x="4" y="4" width="16" height="6" rx="1.5"/><rect x="4" y="14" width="16" height="6" rx="1.5"/><circle cx="8" cy="7" r=".75" fill="currentColor" stroke="none"/><circle cx="8" cy="17" r=".75" fill="currentColor" stroke="none"/>
    {% elif name == "code" %}
    <path d="m9 8-4 4 4 4"/><path d="m15 8 4 4-4 4"/><path d="M13 6 11 18"/>
    {% elif name == "monitor" %}
    <path d="M2 12s3-6 10-6 10 6 10 6-3 6-10 6-10-6-10-6z"/><circle cx="12" cy="12" r="2.5"/>
    {% elif name == "training" %}
    <path d="M12 3 3 8l9 5 9-5-9-5z"/><path d="M3 12l9 5 9-5"/><path d="M3 16l9 5 9-5"/>
    {% elif name == "network" %}
    <circle cx="12" cy="12" r="2"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4M5 5l3 3M16 16l3 3M19 5l-3 3M8 16l-3 3"/>
    {% elif name == "building" %}
    <path d="M4 21V9l8-5 8 5v12"/><path d="M9 21v-6h6v6"/><path d="M9 9h.01M15 9h.01M9 13h.01M15 13h.01"/>
    {% elif name == "pricing" %}
    <path d="M12 3v18"/><path d="M15 7.5H10.5a2.5 2.5 0 0 0 0 5H14a2.5 2.5 0 0 1 0 5H9"/>
    {% elif name == "star" %}
    <path d="m12 3 2.4 4.9 5.4.8-3.9 3.8.9 5.4L12 15.8 7.2 17.9l.9-5.4L4.2 8.7l5.4-.8L12 3z"/>
    {% elif name == "help" %}
    <circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 0 1 4.2 1.8c0 2-2.7 2.2-2.7 4.2"/><circle cx="12" cy="17" r=".75" fill="currentColor" stroke="none"/>
    {% elif name == "calendar" %}
    <rect x="4" y="5" width="16" height="16" rx="2"/><path d="M8 3v4M16 3v4M4 11h16"/>
    {% elif name == "map" %}
    <path d="M12 21s6-4.35 6-10a6 6 0 1 0-12 0c0 5.65 6 10 6 10z"/><circle cx="12" cy="11" r="2"/>
    {% elif name == "clock" %}
    <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>
    {% elif name == "mail" %}
    <rect x="3" y="6" width="18" height="13" rx="2"/><path d="m3 8 9 6 9-6"/>
    {% elif name == "phone" %}
    <path d="M8.5 4.5c.5 2.5 2 5 4 7s4.5 3.5 7 4l1.5-3.5a1 1 0 0 1 1.1-.55c1.2.35 2.45.55 3.75.55a1 1 0 0 1 1 1V18a1 1 0 0 1-1 1C10.5 19 5 13.5 5 6a1 1 0 0 1 1-1h3.75a1 1 0 0 1 1 1c0 1.3.2 2.55.55 3.75a1 1 0 0 1-.55 1.1L8.5 4.5z"/>
    {% elif name == "message" %}
    <path d="M21 12a8 8 0 0 1-8 8H7l-4 3V12a8 8 0 0 1 8-8h4a8 8 0 0 1 8 8z"/>
    {% else %}
    <rect x="4" y="4" width="7" height="7" rx="1.5"/><rect x="13" y="4" width="7" height="7" rx="1.5"/><rect x="4" y="13" width="7" height="7" rx="1.5"/><rect x="13" y="13" width="7" height="7" rx="1.5"/>
    {% endif %}
  </svg>
</span>
